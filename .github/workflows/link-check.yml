name: Link Check

on:
  pull_request:
    branches: [master]
  schedule:
    - cron: '0 6 * * 1' # Monday 06:00 UTC, catch external link rot
  workflow_dispatch:

permissions:
  issues: write

jobs:
  link-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Hugo
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: '0.145.0'
          extended: true

      - name: Build site
        run: hugo --minify

      - name: Check links
        id: lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --config lychee.toml
            --no-progress
            --root-dir ${{ github.workspace }}/public
            'public/**/*.html'
          fail: false # report only, never block

      - name: Create issue on broken links
        if: github.event_name == 'schedule' && steps.lychee.outputs.exit_code != 0
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: Broken links detected
          content-filepath: ./lychee/out.md
          labels: broken-links
